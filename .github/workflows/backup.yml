name: Backup Banco de Dados

on:
  schedule:
    - cron: '0 6 * * *' # Todo dia às 3h (horário de Brasília = UTC-3)
  workflow_dispatch:      # Permite rodar manualmente pelo GitHub

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar cliente PostgreSQL
        run: sudo apt-get install -y postgresql-client

      - name: Gerar backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_PUBLIC_URL }}
          PGSSLMODE: require
        run: |
          FILENAME="backup-$(date +'%Y-%m-%d_%H-%M-%S').sql.gz"
          echo "Gerando backup: $FILENAME"
          pg_dump "$DATABASE_URL" | gzip > "$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "Tamanho: $(du -sh $FILENAME | cut -f1)"

      - name: Salvar backup no GitHub
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90
